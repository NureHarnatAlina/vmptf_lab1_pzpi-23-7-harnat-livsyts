<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Блог{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f6f8;
            color: #1f2328;
            margin: 0;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        header.site {
            background: #fff;
            border-bottom: 1px solid #e1e4e8;
            padding: 16px 20px;
        }
        header.site .inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        header.site h1 {
            font-size: 20px;
            margin: 0;
        }
        header.site h1 a {
            color: #1f2328;
            text-decoration: none;
        }
        nav.actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        h2 {
            font-size: 18px;
            margin: 24px 0 12px;
            color: #1f2328;
        }
        a { color: #0969da; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .card {
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 16px 18px;
            margin-bottom: 10px;
        }
        .card .title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .card .meta { color: #6e7781; font-size: 13px; }
        .badge {
            display: inline-block;
            background: #ddf4ff;
            color: #0969da;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 6px;
        }
        .badge.muted { background: #eaecef; color: #6e7781; }

        .empty {
            color: #6e7781;
            font-style: italic;
            padding: 12px 0;
        }

        .btn {
            display: inline-block;
            padding: 6px 14px;
            background: #1f883d;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #1a7a35; text-decoration: none; }
        .btn.secondary { background: #fff; color: #1f2328; border: 1px solid #d0d7de; }
        .btn.secondary:hover { background: #f3f4f6; }

        form p { margin: 0 0 14px; }
        form label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        form input[type=text],
        form textarea,
        form select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        form textarea { min-height: 120px; resize: vertical; }
        form input:focus, form textarea:focus, form select:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        ul.plain { list-style: none; padding: 0; margin: 0; }

        .crumb {
            display: inline-block;
            margin-bottom: 12px;
            color: #6e7781;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="site">
        <div class="inner">
            <h1><a href="{% url 'blog:article_list' %}">Блог</a></h1>
            <nav class="actions">
                <a class="btn secondary" href="{% url 'blog:category_create' %}">+ Категорія</a>
                <a class="btn" href="{% url 'blog:article_create' %}">+ Стаття</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
